# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo in Render Dashboard → New → Blueprint, or set env vars manually on a Web Service.
#
# Database: Supabase PostgreSQL (not hosted on Render). Set DATABASE_URL (+ DIRECT_URL) in Render env.

services:
  - type: web
    name: raafat-digital-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
